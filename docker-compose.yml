version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Optional: uncomment if you want code to auto-reload in development
    # volumes:
    #   - ./backend:/app

  frontend:
    build:
      context: ./frontend/Note-app
      dockerfile: Dockerfile
    ports:
      - "5173:80" # Maps localhost:5173 to Nginx port 80
    depends_on:
      - backend
